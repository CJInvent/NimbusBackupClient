name: Build and Release

on:
  push:
    # master is the default branch: without it here the entire suite only ever
    # ran on tag pushes, i.e. at release time, which is how a Linux build break
    # reached the v0.2.150 tag. Every gate below must run on ordinary pushes.
    branches: [ main, master, develop, github-release ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]

env:
  GO_VERSION: '1.25'
  NODE_VERSION: '20'

jobs:
  # Check for outdated dependencies (informational only)
  check-deps:
    name: Check Dependency Updates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Check for available updates
        working-directory: gui
        env:
          GOWORK: off
        run: |
          echo "📦 Current dependencies and available updates:"
          echo "================================================"
          go list -u -m all | grep '\[' || echo "✅ All dependencies are up to date!"
          echo ""
          echo "Legend: module current-version [latest-version]"
          echo "No brackets = already at latest version"

  # S11 — frontend gate, early and cheap. The i18n audit also runs as the
  # frontend's `prebuild` hook, but that is 20 minutes into the Windows Wails
  # build; a parity break should cost a minute on ubuntu instead.
  frontend-gate:
    name: Frontend Gate (S11)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: gui/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: gui/frontend
        run: npm ci

      - name: i18n audit (key parity + hardcoded strings)
        working-directory: gui/frontend
        run: npm run i18n-audit

      - name: Frontend build (full parse of the JSX tree)
        working-directory: gui/frontend
        run: npm run build

  # S2 — four-view compile smoke. gui/ code is split by TWO orthogonal build
  # constraints (service/!service and windows/!windows), so a symbol must exist
  # in all four combinations. Nothing else checks them all: golangci-lint sees
  # only linux+!service, `go test` the same, and the Windows GUI/service builds
  # run 20 minutes later behind other gates. linux+service was never checked at
  # all. This is the exact failure class that broke the v0.2.150 tag
  # (snapshot.LogFn declared in a windows-only file, referenced from shared
  # code), and it costs seconds here.
  compile-views:
    name: Compile Views (S2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev

      - name: Vet all four compile views
        working-directory: gui
        env:
          GOWORK: off
        run: |
          go mod tidy
          fail=0
          for goos in linux windows; do
            for tags in "" "service"; do
              label="GOOS=$goos tags=${tags:-none}"
              echo "::group::$label"
              if [ "$goos" = "windows" ]; then export CGO_ENABLED=0; else export CGO_ENABLED=1; fi
              if [ -z "$tags" ]; then
                GOOS=$goos go vet ./... && echo "OK   $label" || { echo "::error::vet failed for $label"; fail=1; }
              else
                GOOS=$goos go vet -tags "$tags" ./... && echo "OK   $label" || { echo "::error::vet failed for $label"; fail=1; }
              fi
              echo "::endgroup::"
            done
          done
          exit $fail

  # Security and quality checks
  security:
    name: Security Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install dependencies
        working-directory: gui
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev

      - name: Tidy dependencies
        working-directory: gui
        env:
          GOWORK: off
        run: go mod tidy

      - name: Run gosec
        env:
          GOWORK: off
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          cd gui && gosec -severity high -confidence high ./...

      - name: Run gosec (controlplane module)
        env:
          GOWORK: off
        run: |
          cd controlplane && gosec -severity high -confidence high ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          working-directory: gui
          args: --timeout=5m
        env:
          GOWORK: off

  # Unit tests
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install dependencies
        working-directory: gui
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev

      - name: Tidy dependencies (controlplane)
        working-directory: controlplane
        env:
          GOWORK: off
        run: go mod tidy

      - name: Run tests (controlplane module)
        working-directory: controlplane
        env:
          GOWORK: off
        run: go test -v -race ./...

      - name: Tidy dependencies
        working-directory: gui
        env:
          GOWORK: off
        run: go mod tidy

      - name: Run tests
        working-directory: gui
        env:
          GOWORK: off
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Generate coverage
        working-directory: gui
        run: go tool cover -html=coverage.out -o coverage.html

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./gui/coverage.out

  # S1 — workspace test sweep. The `test` job above covers gui + controlplane
  # only; every other module's suite existed but NEVER EXECUTED in CI, because
  # GOWORK=off + per-module `go test` compiles dependencies without running
  # their tests. That silently excluded the PBS wire layer (chunking
  # determinism, FIDX spans, catalog round-trip), the image-browse filesystem
  # parsers against their real mkfs fixtures, and the shared pkg/* helpers.
  # Modules with no tests are still built here, which is the only Linux
  # compile check nbd/, directorybackup/ and machinebackup/ get.
  workspace-tests:
    name: Workspace Tests (S1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev

      - name: Test every workspace module
        env:
          GOWORK: off
        run: |
          # gui and controlplane are covered by the `test` job; everything else
          # is here. Keep this list in sync with go.work + pkg/*.
          modules="clientcommon pbscommon snapshot imagebrowse directorybackup machinebackup nbd pkg/logger pkg/retry pkg/security gui/api"
          failed=""
          for m in $modules; do
            echo "::group::$m"
            if ( cd "$m" && go mod tidy && go test -race -count=1 ./... ); then
              echo "PASS $m"
            else
              echo "::error::module tests failed: $m"
              failed="$failed $m"
            fi
            echo "::endgroup::"
          done
          if [ -n "$failed" ]; then
            echo "Failed modules:$failed"
            exit 1
          fi
          echo "All workspace modules passed."

  # S7 + S8(token) + S10 — behavior that only real Windows can prove. VSS,
  # DPAPI and icacls compile on Linux and demonstrate nothing there.
  windows-smoke:
    name: Windows Smoke (S7/S8/S10)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      # S8 (token half): EnsureToken + the icacls DACL that guards the
      # privileged local API. acl_nonwindows.go is a no-op, so this is the only
      # place the real ACL path runs.
      - name: Local API token + DACL smoke (S8)
        working-directory: gui/api
        env:
          GOWORK: off
        run: go test -count=1 -v ./...

      # S7: the encv1 DEK chain against real Windows crypto. Runners have no
      # TPM, so this proves the DPAPI leg and — the assertion that matters —
      # that the chain does NOT silently fall through to plaintext.
      - name: Secret store smoke (S7)
        working-directory: gui
        env:
          GOWORK: off
        run: |
          go mod tidy
          go test -count=1 -v -run 'TestSecretStore' ./...

      # S10: create a real VSS snapshot through the production code path and
      # confirm the 0.2.150 diagnostics actually emit. Non-blocking on its
      # first outings: VSS on a hosted runner is not yet proven stable, and a
      # flaky gate that everyone learns to ignore is worse than an honest
      # advisory one. Promote to blocking once it has a track record.
      - name: VSS snapshot smoke (S10)
        continue-on-error: true
        working-directory: snapshot
        env:
          GOWORK: off
        run: |
          go mod tidy
          go test -count=1 -v -run 'TestVSS' ./...

  # Build CLI for all platforms
  build-cli:
    name: Build CLI
    needs: [security, test, workspace-tests, compile-views, frontend-gate]
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build CLI
        env:
          GOWORK: off
        run: make cli

      # S12 — the cross-compiled binaries at least start. A CLI that panics in
      # init, or was linked against something the target OS lacks, otherwise
      # ships and fails on the customer's machine. All three CLIs parse flags
      # with the stdlib flag package, so -h prints usage and exits 2 without
      # touching PBS, VSS, or (on Windows) the missing-args GUI dialog.
      - name: CLI start smoke (S12)
        shell: bash
        run: |
          shopt -s nullglob
          bins=(dist/proxmoxbackup-*)
          if [ ${#bins[@]} -eq 0 ]; then
            echo "::error::no CLI binaries found in dist/"
            exit 1
          fi
          rc=0
          for b in "${bins[@]}"; do
            echo "::group::$b -h"
            # Portable watchdog: a binary that ignores -h and blocks must not
            # hang the job (macOS runners have no coreutils `timeout`).
            "$b" -h > smoke.out 2>&1 &
            pid=$!
            ( sleep 30; kill -9 $pid 2>/dev/null ) & watchdog=$!
            wait $pid 2>/dev/null
            kill -9 $watchdog 2>/dev/null || true
            out="$(cat smoke.out || true)"
            echo "$out"
            echo "::endgroup::"
            if [ -z "$out" ]; then
              echo "::error::$b produced no output — it may not start on $(uname -s)"
              rc=1
            fi
            case "$out" in
              *panic:*|*"fatal error:"*)
                echo "::error::$b crashed on startup"
                rc=1
                ;;
            esac
          done
          rm -f smoke.out
          exit $rc

      - name: Upload CLI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ runner.os }}
          path: dist/proxmoxbackup-*

  # Build GUI (Windows only for now)
  build-gui:
    name: Build GUI
    needs: [security, test, workspace-tests, compile-views, frontend-gate]
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Wails
        # Pinned to v2.12.0 — the exact version @latest resolved to in the
        # green v0.2.106 build, so we ship identical bytes while keeping a
        # DETERMINISTIC build toolchain (the CLI orchestrates frontend bundling
        # + asset embedding before `go build`, so a floating CLI would make
        # even the .exe non-reproducible). Do NOT pin to the library version in
        # gui/go.mod (v2.8.0): that CLI tag fails to build under Go 1.25.
        # Bumping the library to match is a separate, tested task.
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install Frontend Dependencies
        working-directory: gui/frontend
        run: npm install

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          # When the build is triggered by a tag push (v*), the tag is
          # the source of truth. For branch pushes / PRs we fall back to
          # wails.json + short SHA so dev builds get a sensible,
          # non-overlapping version string.
          #
          # VERSION feeds main.appVersion via ldflags (displayed in the
          # GUI, logged in each run banner). VERSION_MSI feeds the WiX
          # ProductVersion, which must be a strict x.y.z numeric tuple
          # — so on branch builds we strip the -dev-<sha> suffix for
          # the MSI but keep it on the binary.
          $base = (Get-Content gui/wails.json | ConvertFrom-Json).info.productVersion
          if ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}" -replace "^v", ""
            $version_msi = $version
          } else {
            $shortSha = "${{ github.sha }}".Substring(0, 7)
            $version = "$base-dev-$shortSha"
            $version_msi = $base
          }
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "VERSION_MSI=$version_msi" >> $env:GITHUB_OUTPUT
          echo "Building version: $version (MSI: $version_msi)"

      - name: Build GUI
        working-directory: gui
        env:
          GOWORK: off
        run: wails build -clean -platform windows/amd64 -ldflags "-X main.appVersion=${{ steps.version.outputs.VERSION }}"

      # The service is a plain `go build` from gui/ and would otherwise ship
      # with no Windows version info — a strong heuristic/ML false-positive
      # signal (Codex review). Generate a .syso with proper CompanyName /
      # ProductName / version so NimbusBackupSVC.exe looks like normal signed-
      # vendor software. Must run AFTER the Wails GUI build (same package dir):
      # we strip any leftover .syso first so the GUI's resource can't leak into
      # the service link and cause a duplicate-resource error.
      - name: Generate service version resource
        working-directory: gui
        shell: pwsh
        run: |
          Remove-Item *.syso -ErrorAction SilentlyContinue
          go install github.com/josephspurrier/goversioninfo/cmd/goversioninfo@v1.4.0
          $ver = "${{ steps.version.outputs.VERSION }}"
          $p = "${{ steps.version.outputs.VERSION_MSI }}" -split '\.'
          $json = @"
          {
            "FixedFileInfo": {
              "FileVersion":    { "Major": $($p[0]), "Minor": $($p[1]), "Patch": $($p[2]), "Build": 0 },
              "ProductVersion": { "Major": $($p[0]), "Minor": $($p[1]), "Patch": $($p[2]), "Build": 0 }
            },
            "StringFileInfo": {
              "CompanyName": "RDEM Systems",
              "FileDescription": "Nimbus Backup Service",
              "FileVersion": "$ver",
              "InternalName": "NimbusBackupSVC",
              "LegalCopyright": "Copyright (c) 2024-2026 RDEM Systems",
              "OriginalFilename": "NimbusBackupSVC.exe",
              "ProductName": "Nimbus Backup",
              "ProductVersion": "$ver"
            },
            "VarFileInfo": { "Translation": { "LangID": "0409", "CharsetID": "04B0" } }
          }
          "@
          $json | Out-File -Encoding utf8 versioninfo.json
          $gobin = (go env GOPATH) + "\bin\goversioninfo.exe"
          & $gobin -64 -o servicewinres.syso versioninfo.json

      - name: Build Service
        working-directory: gui
        env:
          GOWORK: off
        run: |
          go build -tags service -trimpath -buildmode=pie -ldflags "-s -w -X main.appVersion=${{ steps.version.outputs.VERSION }}" -o build/bin/NimbusBackupSVC.exe
        shell: pwsh

      - name: Copy binaries to dist
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item gui/build/bin/NimbusBackup.exe dist/
          Copy-Item gui/build/bin/NimbusBackupSVC.exe dist/
        shell: pwsh

      # S8 (binary half) — the artifact we actually ship carries its identity.
      # The .syso is an AV false-positive mitigation: an unsigned, UNVERSIONED
      # service binary is exactly what heuristic scanners flag. If the resource
      # ever silently stops linking (it is generated, stripped and rebuilt in
      # adjacent steps), nothing else in the pipeline would notice — the build
      # still succeeds and the binary still runs.
      - name: Binary identity smoke (S8)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          foreach ($exe in @('dist/NimbusBackup.exe', 'dist/NimbusBackupSVC.exe')) {
            if (-not (Test-Path $exe)) { throw "$exe was not produced by the build" }
            if ((Get-Item $exe).Length -lt 1MB) { throw "$exe is implausibly small" }
          }
          $vi = (Get-Item 'dist/NimbusBackupSVC.exe').VersionInfo
          Write-Host "Company=$($vi.CompanyName) Product=$($vi.ProductName) Version=$($vi.ProductVersion) File=$($vi.FileVersion)"
          if ([string]::IsNullOrWhiteSpace($vi.CompanyName)) {
            throw "NimbusBackupSVC.exe has no CompanyName - the versioninfo .syso did not link"
          }
          if ($vi.ProductName -ne 'Nimbus Backup') {
            throw "NimbusBackupSVC.exe ProductName is '$($vi.ProductName)', expected 'Nimbus Backup'"
          }
          if ([string]::IsNullOrWhiteSpace($vi.ProductVersion)) {
            throw "NimbusBackupSVC.exe has no ProductVersion"
          }
          if ($vi.ProductVersion -notlike "${{ steps.version.outputs.VERSION_MSI }}*") {
            throw "NimbusBackupSVC.exe reports version '$($vi.ProductVersion)', expected it to start with '${{ steps.version.outputs.VERSION_MSI }}'"
          }
          Write-Host "S8 OK: service binary carries vendor identity and version metadata."

      - name: Install WiX Toolset
        run: |
          choco install wixtoolset -y
          $env:PATH += ";C:\Program Files (x86)\WiX Toolset v3.14\bin"
          echo "C:\Program Files (x86)\WiX Toolset v3.14\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: pwsh

      - name: Build MSI Installer
        working-directory: installer/wix
        run: |
          # Pass the resolved version to the WiX preprocessor so MSI
          # metadata matches the tag / ldflags version.
          candle.exe "-dProductVersion=${{ steps.version.outputs.VERSION_MSI }}" Product.wxs -ext WixUIExtension -ext WixUtilExtension
          light.exe Product.wixobj -ext WixUIExtension -ext WixUtilExtension -out NimbusBackup.msi
          Copy-Item NimbusBackup.msi ../../dist/
        shell: pwsh

      # S9 — the installer customers actually run. Until now this was a manual
      # checklist (MSI_UNINSTALL_TEST.md), which means in practice it was
      # verified when someone remembered to. Exercises both KEEP_CONFIG
      # branches, since the uninstall dialog's whole contract is "your config
      # survives unless you say otherwise" — and silently deleting a customer's
      # PBS credentials on uninstall is a data-safety failure (dev rule 1).
      #
      # Non-blocking on its first outings: msiexec on a hosted runner installs
      # and starts a real Windows service, and an advisory signal beats a flaky
      # gate people learn to ignore. Promote once it has a track record.
      - name: MSI install/uninstall smoke (S9)
        continue-on-error: true
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $msi = (Resolve-Path 'dist/NimbusBackup.msi').Path
          $cfgDir = "$env:ProgramData\NimbusBackup"

          function Invoke-Msi($msiArgs, $label) {
            $log = "$env:TEMP\msi-$label.log"
            $p = Start-Process msiexec.exe -ArgumentList ($msiArgs + @('/qn', '/l*v', $log)) -Wait -PassThru
            Write-Host "$label exit code: $($p.ExitCode)"
            if ($p.ExitCode -ne 0) {
              Get-Content $log -Tail 60 | ForEach-Object { Write-Host $_ }
              throw "$label failed with exit code $($p.ExitCode)"
            }
          }

          # --- install ---
          Invoke-Msi @('/i', $msi) 'install'

          $svc = Get-Service -Name 'NimbusBackup' -ErrorAction SilentlyContinue
          if (-not $svc) { throw 'the NimbusBackup service was not registered by the MSI' }
          Write-Host "service registered, status=$($svc.Status)"

          $installed = "$env:ProgramFiles\NimbusBackup\NimbusBackup.exe"
          if (-not (Test-Path $installed)) { throw "GUI binary not installed at $installed" }

          # Plant a config so the KEEP_CONFIG contract is observable.
          New-Item -ItemType Directory -Force -Path $cfgDir | Out-Null
          Set-Content -Path "$cfgDir\config.json" -Value '{"smoke":true}'

          # --- uninstall keeping config (the default) ---
          Invoke-Msi @('/x', $msi, 'KEEP_CONFIG=1') 'uninstall-keep'
          if (-not (Test-Path "$cfgDir\config.json")) {
            throw 'KEEP_CONFIG=1 deleted the configuration - customer PBS credentials would be lost on uninstall'
          }
          if (Get-Service -Name 'NimbusBackup' -ErrorAction SilentlyContinue) {
            throw 'the service survived uninstall'
          }
          Write-Host 'KEEP_CONFIG=1 OK: config preserved, service removed.'

          # --- reinstall, then uninstall discarding config ---
          Invoke-Msi @('/i', $msi) 'reinstall'
          Invoke-Msi @('/x', $msi, 'KEEP_CONFIG=0') 'uninstall-purge'
          if (Test-Path "$cfgDir\config.json") {
            throw 'KEEP_CONFIG=0 left the configuration behind'
          }
          Write-Host 'S9 OK: both KEEP_CONFIG branches behave as documented.'

      - name: Upload GUI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NimbusBackup-Windows
          path: |
            dist/NimbusBackup.exe
            dist/NimbusBackup.msi

  # Create release on tag
  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-cli, build-gui, windows-smoke]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write      # mint the Sigstore OIDC token for attestation
      attestations: write  # store the build-provenance attestation

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + tags so `git describe`/`git log PREV_TAG..HEAD` in
          # the release-notes step can compute the previous tag and list the
          # commits since it. A shallow (depth-1) checkout has no prior tags,
          # which left the "What's in this release" section empty.
          fetch-depth: 0
          fetch-tags: true

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create release archives
        run: |
          mkdir -p release

          # CLI Windows
          cd artifacts/cli-Windows && zip ../../release/nimbus-backup-cli-${{ steps.version.outputs.VERSION }}-windows.zip *
          cd ../..

          # CLI Linux
          cd artifacts/cli-Linux && tar -czf ../../release/nimbus-backup-cli-${{ steps.version.outputs.VERSION }}-linux.tar.gz *
          cd ../..

          # CLI macOS
          cd artifacts/cli-macOS && tar -czf ../../release/nimbus-backup-cli-${{ steps.version.outputs.VERSION }}-macos.tar.gz *
          cd ../..

          # GUI Windows - Add .exe, .msi (with and without version) and .zip
          cd artifacts/NimbusBackup-Windows
          cp NimbusBackup.exe ../../release/NimbusBackup-${{ steps.version.outputs.VERSION }}.exe
          cp NimbusBackup.exe ../../release/NimbusBackup.exe
          cp NimbusBackup.msi ../../release/NimbusBackup-${{ steps.version.outputs.VERSION }}.msi
          cp NimbusBackup.msi ../../release/NimbusBackup.msi
          zip ../../release/NimbusBackup-${{ steps.version.outputs.VERSION }}-windows.zip *
          cd ../..

      - name: Generate SHA256 checksums
        run: |
          cd release
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      # Free, OSS-friendly cryptographic provenance: attests that these exact
      # binaries were produced by THIS workflow, from THIS commit. Verifiable
      # with `gh attestation verify <file> --repo rdemsystems/NimbusBackupClient`.
      # A strong trust signal for a sysadmin audience while signing is pending.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            release/NimbusBackup*.exe
            release/NimbusBackup*.msi
            release/*.zip
            release/*.tar.gz

      # Best-effort: submit the Windows binaries to VirusTotal so the release
      # page can link a live multi-engine report (transparency while the
      # Authenticode certificate is pending). Skips cleanly if the secret is
      # absent and never fails the release. The GUI report URL is just the
      # file's SHA-256. We GATE the link on a clean result: a fresh hash can
      # show transient heuristic hits, and we must not publish a link to a
      # "2/70 detected" report as if it were proof of safety — so we poll the
      # analysis and only emit the link when malicious+suspicious == 0.
      - name: Submit to VirusTotal (best-effort, gated on 0 detections)
        continue-on-error: true
        env:
          VT_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}
        run: |
          if [ -z "$VT_KEY" ]; then
            echo "VIRUSTOTAL_API_KEY not set — skipping VirusTotal submission."
            exit 0
          fi
          : > vt-section.md
          emitted=0
          VER="${{ steps.version.outputs.VERSION }}"
          # Use the version-stamped copies so the published label reads
          # "NimbusBackup-v0.2.106.msi" (identical bytes → same VT report).
          for f in "release/NimbusBackup-${VER}.exe" "release/NimbusBackup-${VER}.msi"; do
            [ -f "$f" ] || continue
            name=$(basename "$f")
            sha=$(sha256sum "$f" | awk '{print $1}')
            # Free public API: files must be <32MB (ours are); 4 req/min limit.
            resp=$(curl -sS --max-time 180 -X POST https://www.virustotal.com/api/v3/files \
              -H "x-apikey: $VT_KEY" --form file=@"$f" || true)
            aid=$(jq -r '.data.id // empty' <<<"$resp" 2>/dev/null || true)
            if [ -z "$aid" ]; then
              echo "WARN: VirusTotal submission failed for $name — omitting link."
              sleep 20; continue
            fi
            status=""; mal=0; susp=0
            for _ in $(seq 1 10); do
              sleep 20
              ar=$(curl -sS --max-time 60 -H "x-apikey: $VT_KEY" "https://www.virustotal.com/api/v3/analyses/$aid" || true)
              status=$(jq -r '.data.attributes.status // empty' <<<"$ar" 2>/dev/null || true)
              if [ "$status" = "completed" ]; then
                mal=$(jq  -r '(.data.attributes.stats.malicious  // 0) | tonumber? // 0' <<<"$ar" 2>/dev/null || echo 0)
                susp=$(jq -r '(.data.attributes.stats.suspicious // 0) | tonumber? // 0' <<<"$ar" 2>/dev/null || echo 0)
                break
              fi
            done
            if [ "$status" != "completed" ]; then
              echo "WARN: VirusTotal analysis not completed in time for $name — omitting link."
              continue
            fi
            if [ "$((mal + susp))" -gt 0 ]; then
              echo "WARN: VirusTotal reports $mal malicious / $susp suspicious for $name ($sha) — omitting link to avoid publishing a non-clean report."
              continue
            fi
            if [ "$emitted" -eq 0 ]; then
              { echo ""; echo "### 🛡️ VirusTotal reports — 0 detections"; echo ""; } >> vt-section.md
              emitted=1
            fi
            echo "- [\`$name\`](https://www.virustotal.com/gui/file/$sha) — clean" >> vt-section.md
          done
          if [ -s vt-section.md ]; then cat vt-section.md; else echo "No clean VirusTotal links to publish."; fi

      - name: Generate release notes
        id: notes
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}

          # Create release notes from RELEASE_NOTES.md + recent commits
          cat > RELEASE_BODY.md << 'EOFNOTES'
          # 🚀 Nimbus Backup ${{ steps.version.outputs.VERSION }}

          > ⚠️ **Windows flagged the download as a virus?** This is a known false positive (unsigned Go/Wails binary) — *not* a virus. See [why this happens and how to verify the download](https://nimbus.rdem-systems.com/en/antivirus-false-positive/) · [🇫🇷 FR](https://nimbus.rdem-systems.com/faux-positif-antivirus/). A code-signing certificate (SignPath Foundation) is on the way.

          ## 📝 What's in this release

          EOFNOTES

          # Get commits since last tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            echo "### Changes since ${PREV_TAG}" >> RELEASE_BODY.md
            echo "" >> RELEASE_BODY.md
            git log ${PREV_TAG}..HEAD --pretty=format:"- %s" --no-merges >> RELEASE_BODY.md
            echo "" >> RELEASE_BODY.md
          fi

          # Publish the SHA-256 checksums on the release page itself so users
          # can verify integrity without downloading SHA256SUMS.txt first.
          echo "" >> RELEASE_BODY.md
          echo "### 🔐 SHA-256 checksums" >> RELEASE_BODY.md
          echo "" >> RELEASE_BODY.md
          echo "Verify with \`Get-FileHash <file> -Algorithm SHA256\` (PowerShell) or \`sha256sum -c SHA256SUMS.txt\`." >> RELEASE_BODY.md
          echo "" >> RELEASE_BODY.md
          echo '```' >> RELEASE_BODY.md
          cat release/SHA256SUMS.txt >> RELEASE_BODY.md
          echo '```' >> RELEASE_BODY.md

          # VirusTotal links (produced by the best-effort step above, if any)
          if [ -f vt-section.md ]; then
            cat vt-section.md >> RELEASE_BODY.md
          fi

          # Add full status from RELEASE_NOTES.md
          echo "" >> RELEASE_BODY.md
          echo "---" >> RELEASE_BODY.md
          echo "" >> RELEASE_BODY.md
          cat RELEASE_NOTES.md >> RELEASE_BODY.md

          # Add tested with section
          echo "" >> RELEASE_BODY.md
          echo "---" >> RELEASE_BODY.md
          echo "" >> RELEASE_BODY.md
          echo "### Tested with NimbusBackup" >> RELEASE_BODY.md
          echo "" >> RELEASE_BODY.md
          echo "This release has been tested against NimbusBackup managed PBS — [🇬🇧 EN](https://nimbus.rdem-systems.com/en/blog/backup-windows-proxmox-backup-server/?utm_source=github) · [🇫🇷 FR](https://nimbus.rdem-systems.com/blog/sauvegarder-windows-proxmox-backup-server/?utm_source=github)." >> RELEASE_BODY.md

          # Add links at the end (FR bare URL + EN /en/ variant)
          echo "" >> RELEASE_BODY.md
          echo "---" >> RELEASE_BODY.md
          echo "" >> RELEASE_BODY.md
          echo "**RDEM Systems** — [🇬🇧 EN](https://www.rdem-systems.com/en/) · [🇫🇷 FR](https://www.rdem-systems.com/)" >> RELEASE_BODY.md
          echo "" >> RELEASE_BODY.md
          echo "**Nimbus Backup — Fully managed Proxmox Backup Server datastores** — [🇬🇧 EN](https://nimbus.rdem-systems.com/en/?utm_source=github) · [🇫🇷 FR](https://nimbus.rdem-systems.com/?utm_source=github)" >> RELEASE_BODY.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: RELEASE_BODY.md
          files: release/*
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update latest release badge
        if: ${{ !contains(steps.version.outputs.VERSION, '-') }}
        run: |
          echo "Latest stable release: ${{ steps.version.outputs.VERSION }}"
