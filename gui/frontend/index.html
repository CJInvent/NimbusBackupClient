<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nimbus Backup - RDEM Systems</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        /* Neutral fallback background — index.css (theme tokens) takes over
           on load. Avoids a flash of an unrelated color before it does. */
        body { background: #f5f5f5; min-height: 100vh; }
        #root { width: 100%; height: 100vh; }
    </style>
    <script>
        // Apply the persisted theme, accent, and font size to <html> BEFORE
        // first paint, so there is no flash of the wrong appearance while
        // React mounts. Mirrors components/HeaderControls.jsx — keep the two
        // in sync if the storage keys ever change.
        (function () {
            try {
                var theme = localStorage.getItem('nimbus.theme');
                if (theme && theme !== 'auto') {
                    document.documentElement.setAttribute('data-theme', theme);
                }
                var accent = localStorage.getItem('nimbus.accent');
                if (accent && accent !== 'orange') {
                    document.documentElement.setAttribute('data-accent', accent);
                }
                var size = localStorage.getItem('nimbus.fontsize');
                document.documentElement.setAttribute('data-fontsize', size || 'small');
            } catch (e) { /* localStorage unavailable — defaults apply */ }
        })();
    </script>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
</body>
</html>
